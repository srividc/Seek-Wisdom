<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gita — Wisdom for the Soul</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0705;
      --surface: #120e0a;
      --gold: #c9933a;
      --gold-light: #e8b96a;
      --gold-dim: #7a5520;
      --cream: #f0e6d0;
      --cream-dim: #9e8e72;
      --saffron: #d4612a;
      --lotus: #8b3a5c;
      --text: #e8dcc8;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    /* Mandala background */
    .mandala-bg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
      animation: slowSpin 120s linear infinite;
    }

    @keyframes slowSpin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Flame particles */
    .flames {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .flame {
      position: absolute;
      bottom: -20px;
      width: 4px;
      border-radius: 50% 50% 20% 20%;
      animation: flicker linear infinite;
      opacity: 0;
    }

    @keyframes flicker {
      0%   { transform: translateY(0) scaleX(1);   opacity: 0; }
      10%  { opacity: 0.6; }
      50%  { transform: translateY(-80px) scaleX(0.7); opacity: 0.3; }
      100% { transform: translateY(-160px) scaleX(0.4); opacity: 0; }
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    header {
      width: 100%;
      text-align: center;
      padding: 60px 20px 20px;
      position: relative;
    }

    .om-symbol {
      font-size: 2.8rem;
      color: var(--gold);
      display: block;
      margin-bottom: 10px;
      animation: pulse-gold 3s ease-in-out infinite;
      font-family: serif;
    }

    @keyframes pulse-gold {
      0%, 100% { opacity: 0.7; text-shadow: 0 0 10px rgba(201,147,58,0.3); }
      50%       { opacity: 1;   text-shadow: 0 0 25px rgba(201,147,58,0.7); }
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--gold-light);
      text-shadow: 0 0 40px rgba(201,147,58,0.3);
    }

    header p.subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2vw, 1.2rem);
      color: var(--cream-dim);
      margin-top: 10px;
      letter-spacing: 0.05em;
    }

    .gold-line {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto 0;
    }

    /* Emotion selection */
    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
      text-transform: uppercase;
      text-align: center;
      margin: 50px 0 24px;
    }

    .emotions-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 680px;
      padding: 0 24px;
    }

    .emotion-btn {
      position: relative;
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--cream-dim);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      padding: 10px 22px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 2px;
      overflow: hidden;
    }

    .emotion-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201,147,58,0.08), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .emotion-btn:hover {
      border-color: var(--gold);
      color: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(201,147,58,0.15);
    }

    .emotion-btn:hover::before { opacity: 1; }

    .emotion-btn.active {
      border-color: var(--gold-light);
      color: var(--gold-light);
      background: rgba(201,147,58,0.1);
      box-shadow: 0 0 20px rgba(201,147,58,0.25), inset 0 0 15px rgba(201,147,58,0.05);
    }

    .emotion-btn .emoji {
      margin-right: 6px;
      font-size: 1rem;
    }

    /* Seek button */
    .seek-btn {
      margin-top: 40px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold-light);
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      padding: 16px 48px;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .seek-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(201,147,58,0.15), transparent 60%);
      transition: transform 0.5s ease;
      border-radius: 50%;
    }

    .seek-btn:hover::before { transform: translate(-50%, -50%) scale(1); }
    .seek-btn:hover {
      border-color: var(--gold-light);
      box-shadow: 0 0 30px rgba(201,147,58,0.3);
    }

    .seek-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Loading */
    .loading-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin: 50px 0;
    }

    .loading-state.visible { display: flex; }

    .lotus-spinner {
      width: 50px;
      height: 50px;
      position: relative;
    }

    .lotus-spinner svg {
      animation: lotusRotate 2s ease-in-out infinite;
    }

    @keyframes lotusRotate {
      0%   { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .loading-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--cream-dim);
      font-size: 1rem;
      letter-spacing: 0.05em;
    }

    /* Quote card */
    .quote-card {
      display: none;
      max-width: 720px;
      width: 100%;
      padding: 0 24px 80px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .quote-card.visible {
      display: block;
    }

    .quote-card.animated {
      opacity: 1;
      transform: translateY(0);
    }

    .chapter-tag {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
      text-align: center;
      margin-bottom: 30px;
    }

    .quote-frame {
      border: 1px solid rgba(201,147,58,0.2);
      padding: 40px 44px;
      position: relative;
      background: linear-gradient(135deg, rgba(201,147,58,0.04), transparent 60%);
    }

    .quote-frame::before, .quote-frame::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--gold);
      border-style: solid;
    }

    .quote-frame::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }

    .quote-frame::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    .sanskrit-quote {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      color: var(--gold-light);
      line-height: 1.8;
      text-align: center;
      margin-bottom: 20px;
      font-weight: 300;
    }

    .divider-ornament {
      text-align: center;
      color: var(--gold-dim);
      font-size: 1.2rem;
      margin: 20px 0;
      letter-spacing: 0.5em;
    }

    .english-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.15rem, 2.5vw, 1.45rem);
      color: var(--cream);
      line-height: 1.9;
      text-align: center;
      font-weight: 300;
    }

    .explanation-section {
      margin-top: 40px;
    }

    .explanation-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .explanation-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.05rem, 2vw, 1.2rem);
      color: var(--cream-dim);
      line-height: 2;
      font-weight: 300;
    }

    .explanation-text p + p { margin-top: 16px; }

    .reflection-box {
      margin-top: 36px;
      border-left: 2px solid var(--gold-dim);
      padding: 16px 24px;
      background: rgba(201,147,58,0.04);
    }

    .reflection-label {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--saffron);
      margin-bottom: 10px;
    }

    .reflection-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--cream-dim);
      line-height: 1.8;
    }

    .ask-again-btn {
      display: block;
      margin: 50px auto 0;
      background: transparent;
      border: none;
      color: var(--gold-dim);
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      cursor: pointer;
      transition: color 0.3s;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .ask-again-btn:hover { color: var(--gold-light); }

    /* Error */
    .error-msg {
      display: none;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--saffron);
      text-align: center;
      margin: 20px 0;
      font-size: 1rem;
    }

    .error-msg.visible { display: block; }

    /* Responsive */
    @media (max-width: 500px) {
      .quote-frame { padding: 28px 24px; }
      .emotion-btn { font-size: 0.9rem; padding: 9px 16px; }
    }
  </style>
</head>
<body>

<!-- Mandala SVG background -->
<svg class="mandala-bg" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="250" cy="250" r="240" stroke="#c9933a" stroke-width="0.5"/>
  <circle cx="250" cy="250" r="200" stroke="#c9933a" stroke-width="0.5"/>
  <circle cx="250" cy="250" r="160" stroke="#c9933a" stroke-width="0.5"/>
  <circle cx="250" cy="250" r="120" stroke="#c9933a" stroke-width="0.5"/>
  <circle cx="250" cy="250" r="80" stroke="#c9933a" stroke-width="0.5"/>
  <circle cx="250" cy="250" r="40" stroke="#c9933a" stroke-width="1"/>
  <!-- Petals -->
  <g stroke="#c9933a" stroke-width="0.4">
    <line x1="250" y1="10" x2="250" y2="490"/>
    <line x1="10" y1="250" x2="490" y2="250"/>
    <line x1="74" y1="74" x2="426" y2="426"/>
    <line x1="426" y1="74" x2="74" y2="426"/>
    <line x1="162" y1="10" x2="338" y2="490"/>
    <line x1="10" y1="162" x2="490" y2="338"/>
    <line x1="10" y1="338" x2="490" y2="162"/>
    <line x1="338" y1="10" x2="162" y2="490"/>
  </g>
  <!-- Outer ornaments -->
  <g fill="#c9933a">
    <polygon points="250,18 257,35 243,35"/>
    <polygon points="250,482 257,465 243,465"/>
    <polygon points="18,250 35,257 35,243"/>
    <polygon points="482,250 465,257 465,243"/>
  </g>
</svg>

<!-- Flame particles -->
<div class="flames" id="flames"></div>

<div class="app">
  <header>
    <span class="om-symbol">ॐ</span>
    <h1>BHAGAVAD GITA</h1>
    <p class="subtitle">Ancient wisdom for the modern soul</p>
    <div class="gold-line"></div>
  </header>

  <!-- Emotion picker -->
  <div id="selector">
    <p class="section-label">What stirs within you?</p>
    <div class="emotions-grid" id="emotionsGrid"></div>
    <div style="text-align:center">
      <button class="seek-btn" id="seekBtn" disabled>SEEK WISDOM</button>
    </div>
    <p class="error-msg" id="errorMsg">The wisdom could not be summoned. Please try again.</p>
  </div>

  <!-- Loading -->
  <div class="loading-state" id="loadingState">
    <div class="lotus-spinner">
      <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
        <path d="M25 5 C25 5 30 15 25 25 C20 15 25 5 25 5Z" fill="#c9933a" opacity="0.8"/>
        <path d="M25 5 C25 5 30 15 25 25 C20 15 25 5 25 5Z" fill="#c9933a" opacity="0.8" transform="rotate(45 25 25)"/>
        <path d="M25 5 C25 5 30 15 25 25 C20 15 25 5 25 5Z" fill="#c9933a" opacity="0.8" transform="rotate(90 25 25)"/>
        <path d="M25 5 C25 5 30 15 25 25 C20 15 25 5 25 5Z" fill="#c9933a" opacity="0.8" transform="rotate(135 25 25)"/>
        <path d="M25 5 C25 5 30 15 25 25 C20 15 25 5 25 5Z" fill="#c9933a" opacity="0.6" transform="rotate(180 25 25)"/>
        <path d="M25 5 C25 5 30 15 25 25 C20 15 25 5 25 5Z" fill="#c9933a" opacity="0.6" transform="rotate(225 25 25)"/>
        <path d="M25 5 C25 5 30 15 25 25 C20 15 25 5 25 5Z" fill="#c9933a" opacity="0.6" transform="rotate(270 25 25)"/>
        <path d="M25 5 C25 5 30 15 25 25 C20 15 25 5 25 5Z" fill="#c9933a" opacity="0.6" transform="rotate(315 25 25)"/>
        <circle cx="25" cy="25" r="4" fill="#e8b96a"/>
      </svg>
    </div>
    <p class="loading-text">The Gita speaks to your soul…</p>
  </div>

  <!-- Quote result -->
  <div class="quote-card" id="quoteCard">
    <p class="chapter-tag" id="chapterTag"></p>
    <div class="quote-frame">
      <p class="sanskrit-quote" id="sanskritQuote"></p>
      <div class="divider-ornament">✦ ✦ ✦</div>
      <p class="english-quote" id="englishQuote"></p>
    </div>
    <div class="explanation-section">
      <p class="explanation-label">Wisdom Unfolded</p>
      <div class="explanation-text" id="explanationText"></div>
      <div class="reflection-box">
        <p class="reflection-label">A Gentle Reflection</p>
        <p class="reflection-text" id="reflectionText"></p>
      </div>
    </div>
    <button class="ask-again-btn" id="askAgainBtn">← Seek again</button>
  </div>
</div>

<script>
const EMOTIONS = [
  { label: "Grief",       emoji: "😔", color: "#6b7fa3" },
  { label: "Anger",       emoji: "😤", color: "#c0392b" },
  { label: "Fear",        emoji: "😰", color: "#7d6b9e" },
  { label: "Anxiety",     emoji: "😟", color: "#8e6b9e" },
  { label: "Loneliness",  emoji: "🌑", color: "#4a6274" },
  { label: "Hopelessness",emoji: "😞", color: "#5c6a7a" },
  { label: "Confusion",   emoji: "😕", color: "#7a8c60" },
  { label: "Guilt",       emoji: "😣", color: "#8c7060" },
  { label: "Jealousy",    emoji: "😒", color: "#6b8c6b" },
  { label: "Exhaustion",  emoji: "😮‍💨", color: "#7a7060" },
  { label: "Joy",         emoji: "😊", color: "#c9933a" },
  { label: "Gratitude",   emoji: "🙏", color: "#8c8c3a" },
  { label: "Hope",        emoji: "🌅", color: "#b07030" },
  { label: "Love",        emoji: "❤️", color: "#a03060" },
  { label: "Pride",       emoji: "✨", color: "#9a8a30" },
];

let selectedEmotion = null;

// Build emotion buttons
const grid = document.getElementById('emotionsGrid');
EMOTIONS.forEach(em => {
  const btn = document.createElement('button');
  btn.className = 'emotion-btn';
  btn.innerHTML = `<span class="emoji">${em.emoji}</span>${em.label}`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedEmotion = em.label;
    document.getElementById('seekBtn').disabled = false;
    document.getElementById('errorMsg').classList.remove('visible');
  });
  grid.appendChild(btn);
});

// Flames
const flamesEl = document.getElementById('flames');
for (let i = 0; i < 25; i++) {
  const f = document.createElement('div');
  f.className = 'flame';
  const h = 30 + Math.random() * 80;
  const hue = Math.random() > 0.5 ? '#d4612a' : '#c9933a';
  f.style.cssText = `
    left: ${Math.random() * 100}%;
    height: ${h}px;
    background: linear-gradient(to top, ${hue}, transparent);
    animation-duration: ${1.5 + Math.random() * 2.5}s;
    animation-delay: ${Math.random() * 3}s;
  `;
  flamesEl.appendChild(f);
}

// Seek button
document.getElementById('seekBtn').addEventListener('click', seekWisdom);
document.getElementById('askAgainBtn').addEventListener('click', resetToSelector);

async function seekWisdom() {
  if (!selectedEmotion) return;

  document.getElementById('selector').style.display = 'none';
  document.getElementById('loadingState').classList.add('visible');
  document.getElementById('quoteCard').classList.remove('visible', 'animated');
  document.getElementById('errorMsg').classList.remove('visible');

  const prompt = `You are a scholar and spiritual guide well-versed in the Bhagavad Gita.

A person is feeling: "${selectedEmotion}"

Please provide:
1. A relevant verse from the Bhagavad Gita (give the Sanskrit transliteration AND the English translation)
2. The chapter and verse number
3. A warm, compassionate explanation (2-3 paragraphs) of what this verse means and how it relates to the emotion of "${selectedEmotion}"
4. A short personal reflection prompt (1-2 sentences) to help them internalize the wisdom

Respond ONLY with a JSON object in this exact format (no markdown, no backticks):
{
  "chapter_verse": "Chapter X, Verse Y",
  "sanskrit": "Sanskrit transliteration here",
  "english": "English translation here",
  "explanation": "Full explanation paragraphs here. Use \\n\\n to separate paragraphs.",
  "reflection": "Personal reflection prompt here."
}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content.map(i => i.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    displayQuote(parsed);
  } catch (err) {
    console.error(err);
    document.getElementById('loadingState').classList.remove('visible');
    document.getElementById('selector').style.display = '';
    document.getElementById('errorMsg').classList.add('visible');
  }
}

function displayQuote(data) {
  document.getElementById('chapterTag').textContent = data.chapter_verse.toUpperCase();
  document.getElementById('sanskritQuote').textContent = data.sanskrit;
  document.getElementById('englishQuote').textContent = `"${data.english}"`;

  // Explanation — split by \n\n into paragraphs
  const expEl = document.getElementById('explanationText');
  expEl.innerHTML = '';
  data.explanation.split(/\n\n+/).forEach(para => {
    if (para.trim()) {
      const p = document.createElement('p');
      p.textContent = para.trim();
      expEl.appendChild(p);
    }
  });

  document.getElementById('reflectionText').textContent = data.reflection;

  document.getElementById('loadingState').classList.remove('visible');
  const card = document.getElementById('quoteCard');
  card.classList.add('visible');
  requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('animated')));
}

function resetToSelector() {
  document.getElementById('quoteCard').classList.remove('visible', 'animated');
  document.getElementById('selector').style.display = '';
  document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('active'));
  selectedEmotion = null;
  document.getElementById('seekBtn').disabled = true;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
